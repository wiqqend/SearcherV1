<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Searcher v1</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="header">
        <h1>Search by Algorithm</h1>
    </div>
    <div id="controls">
        <label>Width: <input type="number" id="width" value="10" min="2"></label>
        <label>Height: <input type="number" id="gridHeight" value="10" min="2"></label>
        <label>StartX: <input type="number" id="startX" value="0" min="0"></label>
        <label>StartY: <input type="number" id="startY" value="0" min="0"></label>
        <label>GoalX: <input type="number" id="goalX" value="0" min="0"></label>
        <label>GoalY: <input type="number" id="goalY" value="0" min="0"></label>
        
        <fieldset>
            <legend>Select Algorithm:</legend>
            <input type="radio" id="bfs" name="algorithm" value="BFS">
            <label for="bfs">BFS</label>
        </fieldset>


        <div id="buttons">
            <button onclick="UI.clearGridWalls()">Clear Walls</button>
            <button onclick="UI.startAlgorithm()">Start Algorithm</button>
        </div>
    
    </div>
</body>
</html>
