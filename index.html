<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Searcher v1</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="header">
        <h1>Search by Algorithm</h1>
    </div>
    <div id="userInputs">
        <p>Width of grid: <input type="number" id="width" placeholder="Width of grid"></p>
        <p>Height of grid: <input type="number" id="height" placeholder="Height of grid"></p>
        <p>Start X: <input type="number" id="startX" placeholder="Start X"></p>
        <p>Start Y: <input type="number" id="startY" placeholder="Start Y"></p>
        <p>Goal X: <input type="number" id="goalX" placeholder="Goal X"></p>
        <p>Goal Y: <input type="number" id="goalY" placeholder="Goal Y"></p>
        <div id="algorithmSelection">
            <p>
                Select Algorithm:
                <input type="radio" id="bfs" name="algorithm" value="BFS">
                <label for="bfs">BFS</label>
            </p>
        </div>


        <div id="buttons">
            <button id="clearWalls">Clear Walls</button>
            <button id="startAlgorithm">Start Algorithm</button>
        </div>
    
    </div>

</body>
</html>
