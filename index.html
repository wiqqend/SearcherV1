<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <p>Click to add walls</p>
    <table id="grid-table"></table>
 
    <fieldset class="controls">
        <label>StartX: <input type="number" id="startX" value="0" min="0"></label> <br> 
        <label>StartY: <input type="number" id="startY" value="0" min="0"></label> <br>
        <label>GoalX:  <input type="number" id="goalX"  value="9" min="0"></label> <br>
        <label>GoalY:  <input type="number" id="goalY"  value="9" min="0"></label> <br>
        <label>Width:  <input type="number" id="gridWidth"  value="10" min="2" max="60"></label>
        <label>Height: <input type="number" id="gridHeight" value="10" min="2" max="40"></label>
 
        <fieldset class="algo-box">
            <legend>Select Algorithm</legend>
            <label><input type="radio" name="algo" value="BFS" checked> BFS</label>
        </fieldset>
 
        <button onclick="ui.clearGridWalls()">Reset</button>
        <button onclick="ui.startAlgorithm()">Run Algorithm</button>
    </fieldset>
 
  <script src="script.js" defer></script>
</body>
</html>
